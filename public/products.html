<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SweetPath — Catálogo</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>

<header class="nav">
  <div class="container navbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>SWEETPATH</h1>
        <small>Catálogo • vitrina & pedidos</small>
      </div>
    </div>
    <nav class="navlinks">
      <a class="pill" href="./index.html">Inicio</a>
      <a class="pill" href="./custom.html">Personalizados</a>
      <a class="pill primary" href="./cart.html">Carrito</a>
    </nav>
  </div>
</header>

<main class="container" style="margin-top:16px">
  <div class="panel">
    <div class="row" style="justify-content:space-between">
      <div>
        <h2 style="margin:0">Catálogo</h2>
        <p class="hSub" style="margin:8px 0 0 0">EXPRESS: listo/rápido • CUSTOM/PACK: solicitud y cotización por WhatsApp</p>
      </div>
      <div class="pill" id="cartMini">Carrito: 0</div>
    </div>

    <div class="filters">
  <input id="q" class="input" placeholder="Buscar (ej: brownie, torta…)" />
  <select id="type" class="select">
    <option value="">Todos</option>
    <option value="EXPRESS">EXPRESS</option>
    <option value="CUSTOM">CUSTOM</option>
    <option value="PACK">PACK</option>
  </select>
  <button class="btn primary" id="btnSearch">Buscar</button>
  <button class="btn" id="btnClear">Limpiar</button>
  <a class="btn" href="./cart.html">Ir al carrito</a>
</div>

    <div id="meta" class="notice" style="display:none"></div>
  </div>

  <div id="grid" class="grid" style="margin-top:14px"></div>
</main>

<footer class="container footer">
  <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>© SweetPath</div>
    <div>Catálogo</div>
  </div>
</footer>

<script type="module" src="./js/products.js"></script>
</body>
</html>
