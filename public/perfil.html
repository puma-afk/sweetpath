<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ESENCIA — Mi Perfil</title>
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="menu-overlay"></div>
    <header class="nav">
        <div class="container navbar">
            <a href="./index.html" class="logo-link" title="Ir al inicio">
                <img src="./img/logo_white.png" alt="ESENCIA" class="logo-img">
                <div class="brand-text">
                    <h1>ESENCIA</h1>
                    <small>Repostería artesanal</small>
                </div>
            </a>

            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                <i class="fas fa-bars" id="menuIcon"></i>
            </button>

            <nav class="navlinks" id="mainNav">
                <a class="nav-item" href="./index.html">Inicio</a>
                <a class="nav-item" href="./products.html">Productos</a>
                <a class="nav-item" href="./custom.html">Personalizados</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="panel" style="max-width: 500px; margin: 40px auto; text-align: center;">
            <div id="profileContent">
                <div class="notice">Cargando perfil...</div>
            </div>
        </div>
    </main>

    <script>
        async function cargarPerfil() {
            const res = await fetch('../api/get_session.php');
            const user = await res.json();
            const container = document.getElementById('profileContent');
            const nav = document.getElementById('mainNav');

            if (!user.logged) {
                window.location.href = './login.html';
                return;
            }

            // Inject avatar in nav
            nav.innerHTML += `<a href="./perfil.html" class="nav-item" style="display:flex;align-items:center;gap:8px;background:rgba(255,250,202,0.15);border-radius:20px;padding:5px 15px;"><img src="${user.avatar}" onerror="this.style.display='none'" style="width:28px;height:28px;border-radius:50%;border:2px solid #fffaca;object-fit:cover;"><span>${user.name.split(' ')[0]}</span></a>`;

            container.innerHTML = `
              <img src="${user.avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=004f39&color=fffaca'" style="width:120px;height:120px;border-radius:50%;border:4px solid var(--primary);margin-bottom:20px;">
              <h2 class="hTitle">${user.name}</h2>
              <p class="hSub">${user.email}</p>
              <div class="row" style="justify-content:center;margin-top:30px;gap:15px;">
                <a href="./mis-pedidos.html" class="btn primary"><i class="fas fa-shopping-bag"></i> Ver mis pedidos</a>
                <a href="../api/logout.php" class="btn danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
              </div>`;

            const ui = await import('./js/ui.js');
            ui.initializeNav();
        }
        cargarPerfil();
    </script>
</body>

</html>
