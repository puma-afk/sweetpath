<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ESENCIA — Mi Perfil</title>
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="nav">
        <div class="container navbar">
            <a href="./index.html" class="logo-link" title="Ir al inicio">
                <img src="./img/logo_white.png" alt="ESENCIA" class="logo-img">
                <div class="brand-text">
                    <h1>ESENCIA</h1>
                    <small>Repostería artesanal</small>
                </div>
            </a>

            <button class="menu-toggle" aria-label="Abrir menú"
                onclick="document.getElementById('mainNav').classList.toggle('active')">
                <i class="fas fa-bars"></i>
            </button>

            <nav class="navlinks" id="mainNav">
                <a class="nav-item" href="./index.html">Inicio</a>
                <a class="nav-item" href="./products.html">Productos</a>
                <a class="nav-item" href="./custom.html">Personalizados</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="panel" style="max-width: 500px; margin: 40px auto; text-align: center;">
            <div id="profileContent">
                <div class="notice">Cargando perfil...</div>
            </div>
        </div>
    </main>

    <script>
        async function cargarPerfil() {
            const res = await fetch('../api/get_session.php');
            const user = await res.json();
            const container = document.getElementById('profileContent');

            if (!user.logged) {
                window.location.href = './login.html';
                return;
            }

            container.innerHTML = `
        <img src="${user.avatar}" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--primary); margin-bottom:20px;">
        <h2 class="hTitle">${user.name}</h2>
        <p class="hSub">${user.email}</p>
        
        <div class="row" style="justify-content: center; margin-top:30px; gap:15px;">
          <a href="./mis-pedidos.html" class="btn primary">
            <i class="fas fa-shopping-bag"></i> Ver mis pedidos
          </a>
          <a href="../api/logout.php" class="btn danger">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
          </a>
        </div>
      `;
        }
        cargarPerfil();
    </script>
</body>

</html>
