<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ESENCIA — Mi pedido</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="menu-overlay"></div>
  <header class="nav">
    <div class="container navbar">
      <a href="./index.html" class="logo-link" title="Ir al inicio">
        <img src="./img/logo_white.png" alt="ESENCIA" class="logo-img">
        <div class="brand-text">
          <h1>ESENCIA</h1>
          <small>Repostería artesanal</small>
        </div>
      </a>

      <button class="menu-toggle" aria-label="Abrir menú">
        <i class="fas fa-bars"></i>
      </button>

      <nav class="navlinks" id="mainNav">
        <a class="nav-item" href="./index.html">Inicio</a>
        <a class="nav-item" href="./products.html">Productos</a>
        <a class="nav-item" href="./custom.html">Personalizados</a>
      </nav>
    </div>
  </header>

  <main class="container" style="margin-top:16px">
    <div class="panel">
      <h2 style="margin:0">Mi carrito</h2>
      <p class="hSub" style="margin-top:8px">
        Aquí puedes realizar la compra rápida de nuestra vitrina o packs.
      </p>

      <div id="cartBox" class="notice">Cargando…</div>

      <div id="cartTotalContainer"
        style="display:none; text-align:right; font-size:1.2rem; font-weight:bold; margin-top:15px; padding-top:15px; border-top:2px solid var(--line);">
        Total Estimado: Bs <span id="cartTotalText">0.00</span>
      </div>

      <div class="row" style="margin-top:12px">
        <button class="btn" id="btnClear">Vaciar carrito</button>
        <a class="btn" href="./products.html"><i class="fas fa-store"></i> Seguir comprando</a>
      </div>
    </div>

    <div class="panel" style="margin-top:14px">
      <h3 style="margin:0 0 16px 0">Finalizar pedido</h3>

      <div class="card" style="padding:16px;">
        <div class="row" style="margin-top:0">
          <input id="name" class="input" style="flex:1;min-width:100%" placeholder="Tu nombre (opcional)">
          <input id="phone" class="input" style="flex:1;min-width:100%;margin-top:8px"
            placeholder="Tu WhatsApp (obligatorio)">
        </div>

        <div class="row" style="margin-top:12px">
          <input id="date" class="input" type="date" title="¿Cuándo vas a retirar?" style="flex:1;min-width:100%">
          <div class="time-selector" title="Elige horario de retiro"
            style="display:flex;gap:8px;flex:1;min-width:100%;margin-top:8px">
            <button type="button" class="btn time-pill" data-val="Mañana (10:00 - 13:00)" style="flex:1">☀️
              Mañana</button>
            <button type="button" class="btn time-pill" data-val="Tarde (14:00 - 19:00)" style="flex:1">🌆
              Tarde</button>
            <input type="hidden" id="time" value="">
          </div>
        </div>

        <div style="margin-top:16px">
          <a href="#" id="toggleMessage"
            style="color:var(--primary);text-decoration:none;font-weight:bold;font-size:14px;display:block;text-align:center;padding:8px;background:var(--soft);border-radius:8px;">+
            Añadir mensaje o
            referencia (Opcional)</a>
          <textarea id="customerNote" class="input" placeholder="Ej: Es para regalo, poner nombre en la caja..."
            style="display:none;width:100%;margin-top:10px;min-height:70px;"></textarea>
        </div>

        <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--line);">
          <label style="font-size:14px;font-weight:bold;display:block;margin-bottom:8px">Método de Pago</label>
          <select id="paymentMethod" class="select" style="width:100%">
            <option value="QR">Pagar ahora por QR (Descuenta stock inmediatamente)</option>
            <option value="TIENDA">Pagar al retirar en tienda (Reserva por 4 horas)</option>
          </select>
        </div>

        <div class="row" style="margin-top:20px">
          <button class="btn whatsapp" id="btnConfirm" style="width:100%;">
            <i class="fab fa-whatsapp" style="font-size: 1.3em;"></i> ENVIAR PEDIDO
          </button>
          <div id="msg" class="notice" style="display:none;width:100%"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="container footer" style="margin-bottom:60px">
    <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div>ESENCIA</div>
      <div>Mi pedido</div>
    </div>
  </footer>

  <a href="./cart.html" id="floatingCart" class="floating-cart" style="display:none;">
    <i class="fas fa-shopping-basket"></i>
    <div id="floatingCartBadge" class="floating-cart-badge">0</div>
  </a>

  <script type="module" src="./js/cart.js"></script>
  <script type="module">
    import { bindCartBadge } from "./js/ui.js";
    bindCartBadge("cartBadge");
  </script>
  <script>
    // Script para mostrar el perfil en el menú y proteger la página
    async function verificarSesion() {
      const res = await fetch('../api/get_session.php');
      const user = await res.json();
      const nav = document.getElementById('mainNav'); // Ubicamos el menú

      // Protección: Si estamos en una página privada y no hay sesión, mandarlo a login
      const path = window.location.pathname;
      const paginasPrivadas = ['cart.html', 'custom.html', 'mis-pedidos.html', 'perfil.html'];
      const requiereLogin = paginasPrivadas.some(p => path.includes(p));

      if (!user.logged && requiereLogin) {
        window.location.href = './login.html';
        return;
      }

      // Si está logueado, inyectamos su foto estilo "botón"
      if (user.logged) {
        nav.innerHTML += `
      <a href="./perfil.html" class="nav-item" style="display:flex; align-items:center; justify-content:center; gap:8px; background: rgba(255, 250, 202, 0.15); border-radius: 20px; padding: 5px 15px;">
        <img src="${user.avatar}" style="width:28px; height:28px; border-radius:50%; border:2px solid #fffaca; object-fit:cover;">
        <span>${user.name.split(' ')[0]}</span>
      </a>
    `;
      } else {
        // Si NO está logueado, inyectamos un botón llamativo para Entrar
        nav.innerHTML += `
      <a class="nav-item" href="./login.html" style="background:#fffaca; color:#004f39; border-radius:20px; padding: 8px 20px;">
        <i class="fas fa-user"></i> Entrar
      </a>
    `;
      }

      const ui = await import('./js/ui.js');
      ui.initializeNav();
    }
    verificarSesion();
  </script>
</body>

</html>
