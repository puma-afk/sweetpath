<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ESENCIA — Mi pedido</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/tienda.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#004f39">
    <link rel="apple-touch-icon" href="./img/icon-192.png">
</head>

<body>
  <!-- OVERLAY MENU -->
  <div class="capa-menu" id="capaMenu"></div>

  <!-- HEADER -->
  <header class="navegacion">
    <div class="container barra-nav">
      <a href="./index.html" class="logo-link" title="Ir al inicio">
        <img src="./img/logo_white.png" alt="ESENCIA" class="logo-img">
      </a>
      <button class="boton-menu" id="menuToggle" aria-label="Abrir menú">
        <i class="fas fa-bars" id="menuIcon"></i>
      </button>
      <nav class="enlaces-nav" id="mainNav">
        <a class="item-nav" href="./index.html"><i class="fas fa-house"></i> Inicio</a>
        <a class="item-nav" href="./products.html"><i class="fas fa-store"></i> Vitrina</a>
        <a class="item-nav" href="./custom.html"><i class="fas fa-wand-magic-sparkles"></i> Personalizados</a>
        <a class="item-nav" href="./cart.html" id="cartBadge"><i class="fas fa-basket-shopping"></i> Pedido</a>
      </nav>
    </div>
  </header>

  <main class="container" style="margin-top:16px">
    <div class="panel">
      <h2 style="margin:0; font-family:'Playfair Display', serif; color:var(--primario);">Mi Carrito</h2>
      <p class="hSub" style="margin-top:8px; color:var(--texto); opacity:0.8;">
        Confirma tu selección y prepárate para disfrutar de lo mejor de Esencia.
      </p>

      <div id="cartBox" class="notice">Cargando…</div>

      <div id="cartTotalContainer"
        style="display:none; text-align:right; font-size:1.2rem; font-weight:bold; margin-top:15px; padding-top:15px; border-top:2px solid var(--line);">
        Total Estimado: Bs <span id="cartTotalText">0.00</span>
      </div>

      <div class="row" style="margin-top:12px">
        <button class="btn" id="btnClear">Vaciar carrito</button>
        <a class="btn" href="./products.html"><i class="fas fa-store"></i> Seguir comprando</a>
      </div>
    </div>

    <div class="panel" style="margin-top:14px">
      <h3 style="margin:0 0 16px 0">Finalizar pedido</h3>

      <div class="card" style="padding:16px;">
        <div class="row" style="margin-top:0">
          <input id="name" class="input" style="flex:1;min-width:100%" placeholder="Tu nombre (opcional)">
          <input id="phone" class="input" style="flex:1;min-width:100%;margin-top:8px"
            placeholder="Tu WhatsApp (obligatorio)">
        </div>

        <div class="row" style="margin-top:12px">
          <label style="font-size:14px;font-weight:bold;display:block;width:100%;margin-bottom:-4px">Fecha de retiro o entrega</label>
          <input id="date" class="input" type="date" title="¿Cuándo vas a retirar?" style="flex:1;min-width:100%">
          <div class="time-selector" title="Elige horario de retiro"
            style="display:flex;gap:8px;flex:1;min-width:100%;margin-top:8px">
            <button type="button" class="btn time-pill" data-val="Mañana (10:00 - 13:00)" style="flex:1">
              <i class="fas fa-sun"></i> Mañana
            </button>
            <button type="button" class="btn time-pill" data-val="Tarde (14:00 - 19:00)" style="flex:1">
              <i class="fas fa-moon"></i> Tarde
            </button>
            <input type="hidden" id="time" value="">
          </div>
        </div>

        <div style="margin-top:16px">
          <a href="#" id="toggleMessage"
            style="color:var(--primary);text-decoration:none;font-weight:bold;font-size:14px;display:block;text-align:center;padding:8px;background:var(--soft);border-radius:8px;">+
            Añadir mensaje o
            referencia (Opcional)</a>
          <textarea id="customerNote" class="input" placeholder="Ej: Es para regalo, poner nombre en la caja..."
            style="display:none;width:100%;margin-top:10px;min-height:70px;"></textarea>
        </div>

        <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--line);">
          <label style="font-size:14px;font-weight:bold;display:block;margin-bottom:8px">Método de Pago</label>
          <select id="paymentMethod" class="select" style="width:100%">
            <option value="QR">Pagar ahora por QR </option>
            <option value="TIENDA">reservar(6 horas)</option>
          </select>
        </div>

        <div class="row" style="margin-top:20px">
          <button class="btn whatsapp" id="btnConfirm" style="width:100%;">
            <i class="fab fa-whatsapp" style="font-size: 1.3em;"></i> ENVIAR PEDIDO
          </button>
          <div id="msg" class="notice" style="display:none;width:100%"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="container footer" style="margin-bottom:60px">
    <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div>ESENCIA</div>
      <div>Mi pedido</div>
    </div>
  </footer>

  <!-- BARRA DE NAVEGACIÓN INFERIOR -->
  <nav class="barra-inferior" id="barraInferior">
    <a href="./index.html" class="item-inferior" id="nav-inicio">
      <i class="fas fa-house"></i>
      <span>Inicio</span>
    </a>
    <a href="./products.html" class="item-inferior" id="nav-vitrina">
      <i class="fas fa-store"></i>
      <span>Vitrina</span>
    </a>
    <button class="item-inferior" id="nav-buscar" onclick="abrirBuscador()" style="background:none;border:none;cursor:pointer;">
      <i class="fas fa-magnifying-glass"></i>
      <span>Buscar</span>
    </button>
    <a href="./custom.html" class="item-inferior" id="nav-custom">
      <i class="fas fa-wand-magic-sparkles"></i>
      <span>Custom</span>
    </a>
    <a href="./perfil.html" class="item-inferior" id="nav-perfil">
      <i class="fas fa-user"></i>
      <span>Perfil</span>
    </a>
  </nav>

  <!-- BUSCADOR GLOBAL (OVERLAY) -->
  <div class="buscador-fondo" id="buscadorFondo">
    <div class="buscador-panel">
      <div class="buscador-barra">
        <i class="fas fa-magnifying-glass buscador-icono"></i>
        <input type="search" id="buscadorInput" class="buscador-input" placeholder="Buscar productos, paquetes..." autocomplete="off">
        <button class="buscador-cerrar" id="buscadorCerrar"><i class="fas fa-times"></i></button>
      </div>
      <div id="buscadorResultados" class="buscador-resultados"></div>
    </div>
  </div>

  <!-- MODAL DE PRODUCTO -->
  <div class="modal-fondo" id="modalFondo">
    <div class="modal-tarjeta" id="modalTarjeta">
      <span class="modal-handle"></span>
      <button class="modal-cerrar" id="modalCerrar"><i class="fas fa-times"></i></button>
      <div class="modal-img" id="modalImg"></div>
      <div class="modal-cuerpo">
        <div class="modal-etiqueta" id="modalEtiqueta"></div>
        <h3 class="modal-titulo" id="modalTitulo"></h3>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-detalles" id="modalDetalles" style="display:none;"></div>
        <div class="modal-precio-fila">
          <div class="modal-precio" id="modalPrecio"></div>
          <div id="modalAccion"></div>
        </div>
      </div>
    </div>
  </div>

  <a href="./cart.html" id="floatingCart" class="floating-cart" style="display:none; bottom: 105px; z-index: 10001;">
    <i class="fas fa-shopping-basket"></i>
    <div id="floatingCartBadge" class="floating-cart-badge">0</div>
  </a>

  <script type="module" src="./js/cart.js"></script>
  <script type="module">
    import { bindCartBadge } from "./js/ui.js";
    bindCartBadge("cartBadge");
  </script>
  <script>
    // Session check & inject user avatar in nav
    async function verificarSesion() {
      const res = await fetch('../api/get_session.php');
      const user = await res.json();
      const nav = document.getElementById('mainNav');
      const path = window.location.pathname;
      const paginasPrivadas = ['cart.html', 'custom.html', 'mis-pedidos.html', 'perfil.html'];
      if (!user.logged && paginasPrivadas.some(p => path.includes(p))) {
        window.location.href = './login.html';
        return;
      }
      if (user.logged) {
        nav.innerHTML += `<a href="./perfil.html" class="nav-item" style="display:flex;align-items:center;gap:8px;background:rgba(255,250,202,0.15);border-radius:20px;padding:5px 15px;">
          <img src="${user.avatar}" onerror="this.style.display='none'" style="width:28px;height:28px;border-radius:50%;border:2px solid #fffaca;object-fit:cover;">
          <span>${user.name.split(' ')[0]}</span></a>`;
      } else {
        nav.innerHTML += `<a class="nav-item" href="./login.html" style="background:#fffaca;color:#004f39;border-radius:20px;padding:8px 20px;"><i class="fas fa-user"></i> Entrar</a>`;
      }

      const ui = await import('./js/ui.js');
      ui.initializeNav();
    }
    verificarSesion();
  </script>
  <script src="./js/menu.js"></script>
  <script>

    // ── Global Search & Modals
    window.abrirModalProducto = function(p) {
      document.getElementById('modalImg').innerHTML = p.image_url
        ? `<img src="${p.image_url}" alt="${p.name}">`
        : `<div class="modal-img-placeholder"><i class="fas fa-cake-candles"></i></div>`;
      let tipo = p.type === 'EXPRESS' ? 'RÁPIDO' : p.type === 'CUSTOM' ? 'PERSONALIZADO' : 'PAQUETE';
      let disponible = p.availability === 'OUT' ? 'AGOTADO' : 'DISPONIBLE';
      document.getElementById('modalEtiqueta').textContent = `${tipo} • ${disponible}`;
      document.getElementById('modalTitulo').textContent = p.name;
      document.getElementById('modalDesc').textContent = p.description || 'Elaborado con ingredientes artesanales seleccionados.';
      
      const divDetalles = document.getElementById('modalDetalles');
      if (divDetalles) divDetalles.innerHTML = '';

      document.getElementById('modalPrecio').innerHTML = p.price_bs
        ? `<strong>Bs ${p.price_bs}</strong><small>referencial</small>`
        : `<strong>A confirmar</strong><small>por WhatsApp</small>`;
      const canAdd = (p.type === 'EXPRESS' || p.type === 'PACK') && p.availability !== 'OUT';
      document.getElementById('modalAccion').innerHTML = canAdd
        ? `<button class="boton primario" onclick="window.agregarDesdeModal(${p.id})"><i class="fas fa-cart-plus"></i> Agregar</button>`
        : p.type !== 'EXPRESS'
          ? `<a class="boton primario" href="./custom.html?type=${p.type}"><i class="fas fa-paper-plane"></i> Solicitar</a>`
          : `<button class="boton" disabled>Agotado</button>`;
      document.getElementById('modalFondo').classList.add('activo');
      document.body.style.overflow = 'hidden';
    };

    document.getElementById('modalCerrar').addEventListener('click', () => {
      document.getElementById('modalFondo').classList.remove('activo');
      document.body.style.overflow = '';
    });
    document.getElementById('modalFondo').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalFondo')) {
        document.getElementById('modalFondo').classList.remove('activo');
        document.body.style.overflow = '';
      }
    });

    // Delegar global helper para modal (como no hay productos listados localmente, importamos cart-manager)
    window.agregarDesdeModal = async (id) => {
      if (!window._todosProductos) return;
      const p = window._todosProductos.find((x) => x.id === id);
      if (p) {
        const { addToCart } = await import('./js/cart-manager.js');
        addToCart(p);
        document.getElementById('modalFondo')?.classList.remove('activo');
        document.body.style.overflow = '';
        setTimeout(() => location.reload(), 300); // Reload cart view
      }
    };

    let _todosProductos = null;
    async function obtenerProductos() {
      if (_todosProductos) return _todosProductos;
      try {
        const res = await fetch('/api/products_list.php?limit=200');
        const data = await res.json();
        _todosProductos = window._todosProductos = data.products || [];
      } catch { _todosProductos = window._todosProductos = []; }
      return _todosProductos;
    }

    window.abrirBuscador = async function() {
      document.getElementById('buscadorFondo').classList.add('activo');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('buscadorInput').focus(), 300);
      await obtenerProductos();
      mostrarResultados('');
    };

    window.cerrarBuscador = function() {
      document.getElementById('buscadorFondo').classList.remove('activo');
      document.body.style.overflow = '';
    }

    function mostrarResultados(q) {
      const lista = (_todosProductos || []).filter(p =>
        !q || p.name.toLowerCase().includes(q.toLowerCase()) || (p.description || '').toLowerCase().includes(q.toLowerCase())
      ).slice(0, 8);
      const cont = document.getElementById('buscadorResultados');
      if (!lista.length) {
        cont.innerHTML = `<div class="buscador-vacio"><i class="fas fa-search" style="font-size:2rem;opacity:0.3;display:block;margin-bottom:8px;"></i>Sin resultados para "${q}"</div>`;
        return;
      }
      cont.innerHTML = lista.map(p => {
        const imgHtml = p.image_url
          ? `<img src="${p.image_url}" class="resultado-img" alt="">`
          : `<div class="resultado-img" style="display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--linea)"><i class="fas fa-cake-candles"></i></div>`;
        const tipo = p.type === 'EXPRESS' ? 'Rápido' : p.type === 'CUSTOM' ? 'Personalizado' : 'Paquete';
        const precio = p.price_bs ? `Bs ${p.price_bs}` : 'Cotizar por WA';
        const dest = `./products.html?q=${encodeURIComponent(p.name)}`;
        return `<a class="resultado-item" href="${dest}" onclick="cerrarBuscador()">
          ${imgHtml}
          <div class="resultado-info">
            <div class="resultado-titulo">${p.name}</div>
            <div class="resultado-sub">${tipo} &bull; ${precio}</div>
          </div>
          <i class="fas fa-chevron-right" style="color:var(--linea);font-size:13px;"></i>
        </a>`;
      }).join('');
    }

    document.getElementById('buscadorInput').addEventListener('input', (e) => {
      mostrarResultados(e.target.value.trim());
    });
    document.getElementById('buscadorCerrar').addEventListener('click', cerrarBuscador);
    document.getElementById('buscadorFondo').addEventListener('click', (e) => {
      if (e.target === document.getElementById('buscadorFondo')) cerrarBuscador();
    });
  </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.error('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
