<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SweetPath — Carrito</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>

<header class="nav">
  <div class="container navbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>SWEETPATH</h1>
        <small>Carrito EXPRESS</small>
      </div>
    </div>
    <nav class="navlinks">
      <a class="pill" href="./index.html">Inicio</a>
      <a class="pill" href="./products.html">Catálogo</a>
      <a class="pill" href="./custom.html">Personalizados</a>
      <a class="pill primary" id="cartBadge" href="./cart.html">Carrito (0)</a>
    </nav>
  </div>
</header>

<main class="container" style="margin-top:16px">
  <div class="panel">
    <h2 style="margin:0">Carrito (EXPRESS)</h2>
    <p class="hSub" style="margin-top:8px">
      Tu pedido se confirmará por WhatsApp antes de mostrar QR/pago.
    </p>

    <div id="cartBox" class="notice">Cargando…</div>

    <div class="row" style="margin-top:12px">
      <button class="btn" id="btnClear">Vaciar carrito</button>
      <a class="btn" href="./products.html">Seguir comprando</a>
    </div>
  </div>

  <div class="panel" style="margin-top:14px">
    <h3 style="margin:0">Datos para el pedido</h3>
    <div class="row" style="margin-top:10px">
      <input id="name" class="pill" style="flex:1;min-width:220px" placeholder="Tu nombre (opcional)">
      <input id="phone" class="pill" style="flex:1;min-width:220px" placeholder="Tu WhatsApp (obligatorio)">
    </div>
    <div class="row" style="margin-top:10px">
      <input id="date" class="pill" type="date" style="flex:1;min-width:220px">
      <input id="time" class="pill" type="time" style="flex:1;min-width:220px">
    </div>

    <div class="row" style="margin-top:12px">
      <button class="btn primary" id="btnConfirm">Confirmar por WhatsApp</button>
      <div id="msg" class="notice" style="display:none"></div>
    </div>
  </div>
</main>

<footer class="container footer">
  <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>© SweetPath</div>
    <div>Carrito</div>
  </div>
</footer>

<script type="module" src="./js/cart.js"></script>
<script type="module">
  import { bindCartBadge } from "./js/ui.js";
  bindCartBadge("cartBadge");
</script>
</body>
</html>
