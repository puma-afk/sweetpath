<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ESENCIA — Iniciar Sesión</title>
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="./css/tienda.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      .login-page {
        background-color: var(--fondo);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .login-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
      }
      .login-card {
        background: white;
        border: 1px solid var(--linea);
        border-top: 3px solid var(--primario);
        border-radius: 24px;
        padding: 50px 30px 40px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px var(--negro-suave);
        position: relative;
      }
      /* Círculo decorativo que enmarca el logo */
      .logo-circle {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        background: linear-gradient(145deg, var(--suave), rgba(0,79,57,0.06));
        border: 2px solid rgba(0, 79, 57, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        box-shadow: 0 8px 30px rgba(0, 79, 57, 0.08);
        position: relative;
      }
      .logo-circle::before {
        content: '';
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 1px dashed rgba(0, 79, 57, 0.12);
      }
      .logo-circle img {
        width: 85px;
        height: auto;
        object-fit: contain;
      }
      .login-card h2 {
        color: var(--primario);
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem;
        margin: 0 0 8px 0;
      }
      .login-sub {
        color: var(--texto);
        font-size: 0.9rem;
        opacity: 0.7;
        line-height: 1.6;
        margin-bottom: 30px;
      }
      .login-google {
        margin-bottom: 24px;
        display: flex;
        justify-content: center;
      }
      .login-back {
        border-top: 1px solid var(--linea);
        padding-top: 18px;
        margin-top: 10px;
      }
      .login-back a {
        color: var(--primario);
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.2s;
      }
      .login-back a:hover { opacity: 0.7; }
      .login-footer {
        text-align: center;
        padding: 20px;
        color: var(--atenuado);
        font-size: 0.8rem;
      }
      /* Decoraciones de fondo crema */
      .login-deco {
        position: absolute;
        border-radius: 50%;
        background: rgba(0, 79, 57, 0.03);
        pointer-events: none;
      }
      .login-deco-1 { width: 200px; height: 200px; top: -60px; right: -60px; }
      .login-deco-2 { width: 150px; height: 150px; bottom: -40px; left: -40px; }
      @media (max-width: 500px) {
        .login-card { padding: 40px 20px 30px; margin: 10px; }
        .logo-circle { width: 110px; height: 110px; }
        .logo-circle img { width: 70px; }
        .login-card h2 { font-size: 1.5rem; }
      }
    </style>
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#004f39">
    <link rel="apple-touch-icon" href="./img/icon-192.png">
</head>

<body>
    <div class="login-page">
      <!-- HEADER -->
      <header class="navegacion">
        <div class="container barra-nav">
          <a href="./index.html" class="logo-link">
            <img src="./img/logo_white.png" alt="ESENCIA" class="logo-img">
          </a>
        </div>
      </header>

      <div class="login-content">
        <div class="login-card">
          <!-- Decoraciones de fondo -->
          <div class="login-deco login-deco-1"></div>
          <div class="login-deco login-deco-2"></div>

          <!-- Logo con marco circular -->
          <div class="logo-circle">
            <img src="./img/logo.png" alt="ESENCIA">
          </div>

          <h2>Bienvenido</h2>
          <p class="login-sub">Inicia sesión para gestionar tus pedidos personalizados y ver tu historial artesanal.</p>

          <div class="login-google">
            <div id="g_id_onload"
                data-client_id="349806175640-65d64o579a7v28s66mr06q37175u89vo.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                data-text="signin_with" data-size="large" data-logo_alignment="left">
            </div>
          </div>

          <div class="login-back">
            <a href="./index.html">
              <i class="fas fa-arrow-left"></i> Volver a la tienda
            </a>
          </div>
        </div>
      </div>

      <div class="login-footer">
        &copy; 2026 Esencia Repostería Artesanal
      </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            fetch('../api/auth_google.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = './index.html';
                    } else {
                        alert("Error al iniciar sesión: " + data.error);
                    }
                })
                .catch(err => console.error("Error:", err));
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.error('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
