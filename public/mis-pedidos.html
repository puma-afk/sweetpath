<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ESENCIA — Mis Pedidos</title>
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="nav">
        <div class="container navbar">
            <a href="./index.html" class="logo-link">
                <img src="./img/logo_white.png" alt="ESENCIA" class="logo-img">
                <div class="brand-text">
                    <h1>ESENCIA</h1>
                    <small>Mis Pedidos</small>
                </div>
            </a>

            <button class="menu-toggle" aria-label="Abrir menú"
                onclick="document.getElementById('mainNav').classList.toggle('active')">
                <i class="fas fa-bars"></i>
            </button>

            <nav class="navlinks" id="mainNav">
                <a class="nav-item" href="./index.html">Inicio</a>
                <a class="nav-item" href="./products.html">Productos</a>
                <a class="nav-item" href="./custom.html">Personalizados</a>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top: 20px;">
        <div class="panel">
            <h2 class="hTitle">Mis Pedidos</h2>
            <div id="listaPedidos" class="grid" style="margin-top: 15px;">
                <div class="notice">Cargando...</div>
            </div>
        </div>
    </main>

    <script>
        async function cargarPedidos() {
            const res = await fetch('../api/get_my_orders.php');
            const data = await res.json();
            const container = document.getElementById('listaPedidos');

            if (data.orders.length === 0) {
                container.innerHTML = '<div class="notice">Aún no tienes pedidos registrados.</div>';
                return;
            }

            container.innerHTML = data.orders.map(o => `
            <div class="card">
                <div class="cardBody">
                    <span class="badge ${o.status.toLowerCase()}">${o.status}</span>
                    <h3 class="cardTitle" style="margin-top: 8px;">Pedido #${o.order_code}</h3>
                    <p class="cardDesc">
                        <i class="fas fa-calendar"></i> Realizado: ${o.fecha_fmt}<br>
                        <i class="fas fa-truck"></i> Entrega: ${o.pickup_date || 'Pendiente'}
                    </p>
                    <div class="meta">
                        <span class="price">Bs ${o.total_bs}</span>
                    </div>
                </div>
            </div>
            `).join('');
        }
        cargarPedidos();

        // Script para mostrar el perfil en el menú y proteger la página
        async function verificarSesion() {
            const res = await fetch('../api/get_session.php');
            const user = await res.json();

            if (!user.logged) {
                window.location.href = './login.html';
                return;
            }

            const navLinks = document.getElementById('mainNav');
            navLinks.innerHTML += `
            <a href="./perfil.html" class="nav-item" style="display:flex; align-items:center; justify-content:center; gap:8px; background: rgba(255, 250, 202, 0.15); border-radius: 20px; padding: 5px 15px;">
                <img src="${user.avatar}" style="width:28px; height:28px; border-radius:50%; border:2px solid #fffaca; object-fit:cover;">
                <span>${user.name.split(' ')[0]}</span>
            </a>
            `;
        }
        verificarSesion();
    </script>
</body>

</html>
