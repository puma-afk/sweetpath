<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ESENCIA — Mis Pedidos</title>
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="./css/tienda.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      /* Forzar 1 columna siempre para tarjetas de pedido */
      #listaPedidos {
        display: flex !important;
        flex-direction: column !important;
        gap: 20px !important;
        max-width: 620px;
        margin: 0 auto;
      }
      /* Tarjeta de pedido responsiva */
      .pedido-card {
        background: white;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border-radius: 16px;
        border: 1px solid #e5e7eb;
        overflow: hidden;
        transition: box-shadow 0.2s;
      }
      .pedido-card:hover {
        box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      }
      .pedido-body {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .pedido-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 8px;
      }
      .pedido-precio {
        font-size: 1.5rem;
        color: #111;
        font-weight: 800;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .pedido-info {
        font-size: 0.9rem;
        color: #444;
        line-height: 1.8;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      @media (min-width: 768px) {
        .pedido-body { padding: 28px 32px; }
        .pedido-header { align-items: center; }
        .pedido-precio { font-size: 1.6rem; }
        .pedido-info { display: flex; gap: 24px; }
      }
      /* QR download */
      .qr-download-btn {
        display: inline-flex; align-items: center; gap: 6px;
        background: var(--primario); color: white;
        padding: 8px 16px; border-radius: 8px; border: none;
        font-size: 0.85rem; font-weight: 600; cursor: pointer;
        margin-top: 8px; transition: opacity 0.2s;
        font-family: 'Plus Jakarta Sans', sans-serif;
        text-decoration: none;
      }
      .qr-download-btn:hover { opacity: 0.85; }
      /* Timeline mejorada - más visible */
      .timeline-bar { position: relative; margin: 20px 0 8px; }
      .timeline-track {
        position: absolute; top: 14px; left: 20px; right: 20px;
        height: 4px; background: #d1d5db; border-radius: 2px; z-index: 0;
      }
      .timeline-fill {
        height: 100%; border-radius: 2px;
        background: linear-gradient(90deg, var(--primario), #2e7d32);
        transition: width 0.5s ease;
      }
      .timeline-dots {
        display: flex; justify-content: space-between;
        position: relative; z-index: 1;
      }
      .timeline-dot {
        width: 28px; height: 28px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; color: white; transition: all 0.3s;
      }
      .timeline-dot.done {
        background: var(--primario);
        border: 3px solid var(--primario);
        box-shadow: 0 2px 8px rgba(0,79,57,0.3);
      }
      .timeline-dot.current {
        background: var(--primario);
        border: 3px solid var(--primario);
        box-shadow: 0 0 0 5px rgba(0,79,57,0.15), 0 2px 8px rgba(0,79,57,0.3);
        transform: scale(1.15);
      }
      .timeline-dot.pending {
        background: #e5e7eb;
        border: 3px solid #d1d5db;
        color: #9ca3af;
      }
      .timeline-labels {
        display: flex; justify-content: space-between; margin-top: 8px;
      }
      .timeline-label {
        flex: 1; text-align: center; font-size: 10px;
        font-weight: 700; line-height: 1.3; padding: 0 2px;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .timeline-label.done, .timeline-label.current { color: var(--primario); }
      .timeline-label.pending { color: #9ca3af; }
    </style>
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#004f39">
    <link rel="apple-touch-icon" href="./img/icon-192.png">
</head>

<body>
    <!-- OVERLAY MENU -->
    <div class="capa-menu" id="capaMenu"></div>

    <!-- HEADER -->
    <header class="navegacion">
        <div class="container barra-nav">
            <a href="./index.html" class="logo-link">
                <img src="./img/logo_white.png" alt="ESENCIA" class="logo-img">
            </a>

            <button class="boton-menu" id="menuToggle" aria-label="Abrir menú">
                <i class="fas fa-bars" id="menuIcon"></i>
            </button>

            <nav class="enlaces-nav" id="mainNav">
                <a class="item-nav" href="./index.html"><i class="fas fa-house"></i> Inicio</a>
                <a class="item-nav" href="./products.html"><i class="fas fa-store"></i> Vitrina</a>
                <a class="item-nav" href="./custom.html"><i class="fas fa-wand-magic-sparkles"></i> Personalizados</a>
                <a class="item-nav" href="./cart.html" id="cartBadge"><i class="fas fa-basket-shopping"></i> Pedido</a>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top: 20px; padding-bottom: 100px;">
        <div class="panel">
            <h2 style="margin:0; font-family:'Playfair Display', serif; color:var(--primario); font-size:1.6rem;">
                <i class="fas fa-receipt" style="margin-right:8px; opacity:0.7;"></i>Mis Pedidos
            </h2>
            <p style="margin-top:8px; color:#555; font-size:0.95rem; font-family:'Plus Jakarta Sans', sans-serif;">
                Consulta el estado y seguimiento de tus pedidos artesanales.
            </p>
            <div id="listaPedidos" style="margin-top: 15px;">
                <div class="notice">Cargando...</div>
            </div>
        </div>
    </main>

    <!-- BARRA DE NAVEGACIÓN INFERIOR -->
    <nav class="barra-inferior" id="barraInferior">
        <a href="./index.html" class="item-inferior" id="nav-inicio">
            <i class="fas fa-house"></i><span>Inicio</span>
        </a>
        <a href="./products.html" class="item-inferior" id="nav-vitrina">
            <i class="fas fa-store"></i><span>Vitrina</span>
        </a>
        <a href="./custom.html" class="item-inferior" id="nav-custom">
            <i class="fas fa-wand-magic-sparkles"></i><span>Custom</span>
        </a>
        <a href="./perfil.html" class="item-inferior" id="nav-perfil">
            <i class="fas fa-user"></i><span>Perfil</span>
        </a>
    </nav>

    <!-- CARRITO FLOTANTE -->
    <a href="./cart.html" id="floatingCart" class="carrito-flotante" style="display:none;">
        <i class="fas fa-basket-shopping"></i>
        <div id="floatingCartBadge" class="etiqueta-flotante">0</div>
    </a>

    <script src="./js/menu.js"></script>

    <script>
        async function cargarPedidos() {
            const container = document.getElementById('listaPedidos');
            try {
                const res = await fetch('../api/get_my_orders.php');
                const data = await res.json();

                if (!data.success || !data.orders) {
                    container.innerHTML = `<div class="notice" style="border-color:var(--primario);color:var(--primario);background:var(--suave);">
                        <i class="fas fa-right-to-bracket" style="margin-right:6px;"></i>
                        Tu sesión expiró. <a href='./login.html' style='color:var(--primario);text-decoration:underline;font-weight:700;'>Vuelve a iniciar sesión</a>.
                    </div>`;
                    return;
                }

                if (data.orders.length === 0) {
                    container.innerHTML = `<div class="notice" style="text-align:center; padding:40px 20px;">
                        <i class="fas fa-box-open" style="font-size:2.5rem; color:var(--primario); opacity:0.4; display:block; margin-bottom:12px;"></i>
                        <span style="font-size:1.05rem; color:#333;">Aún no tienes pedidos registrados.</span>
                    </div>`;
                    return;
                }

                container.innerHTML = data.orders.map(o => renderOrder(o)).join('');
            } catch (err) {
                container.innerHTML = `<div class="notice" style="border-color:#e53e3e;color:#c53030;">
                    <i class="fas fa-triangle-exclamation" style="margin-right:6px;"></i>Error cargando pedidos. Intenta de nuevo.
                </div>`;
            }
        }

        function renderOrder(o) {
            const states = ['CREATED', 'APROBADO_PARA_PAGO', 'EN_PRODUCCION', 'LISTO', 'ENTREGADO'];
            const labels = ['Creado', 'Aprobado', 'Producción', 'Listo', 'Entregado'];
            const icons  = ['fa-circle-dot', 'fa-credit-card', 'fa-fire', 'fa-check', 'fa-flag-checkered'];
            let stIndex = states.indexOf(o.status);
            if (stIndex < 0) stIndex = 0;

            const pct = stIndex === 0 ? 0 : Math.round((stIndex / (states.length - 1)) * 100);

            const timelineHtml = `
            <div class="timeline-bar">
                <div class="timeline-track">
                    <div class="timeline-fill" style="width:${pct}%;"></div>
                </div>
                <div class="timeline-dots">
                    ${states.map((st, i) => {
                        const cls = i < stIndex ? 'done' : i === stIndex ? 'current' : 'pending';
                        return `<div class="timeline-dot ${cls}"><i class="fas ${icons[i]}"></i></div>`;
                    }).join('')}
                </div>
                <div class="timeline-labels">
                    ${labels.map((lbl, i) => {
                        const cls = i < stIndex ? 'done' : i === stIndex ? 'current' : 'pending';
                        return `<div class="timeline-label ${cls}">${lbl}</div>`;
                    }).join('')}
                </div>
            </div>`;

            let paymentHtml = '';
            if (o.status === 'APROBADO_PARA_PAGO') {
                const isCash = o.payment_method === 'TIENDA';

                if (isCash) {
                    paymentHtml = `
                    <div style="margin-top:15px;padding:16px;background:#f0fdf4;border-radius:12px;border:1px solid #bbf7d0;">
                        <h4 style="margin:0 0 8px 0;color:#166534;font-size:1rem;font-family:'Plus Jakarta Sans',sans-serif;">
                            <i class="fas fa-store" style="margin-right:6px;"></i>Pago en Tienda
                        </h4>
                        <p style="font-size:0.9rem;color:#333;margin:0;line-height:1.6;">
                            Seleccionaste <b>pago al retirar en tienda</b>. No necesitas hacer nada aquí.<br>
                            Al recoger tu pedido pagas en efectivo o con el método disponible en tienda.
                        </p>
                        ${o.total_bs !== 'Por cotizar' ? `<div style="margin-top:10px;font-size:1.1rem;font-weight:bold;color:#166534;">Total a pagar: Bs ${o.total_bs}</div>` : ''}
                    </div>`;
                } else if (o.has_pending_proof) {
                    paymentHtml = `<div style="margin-top:15px;padding:16px;background:#fffbeb;border-radius:12px;border:1px solid #fde68a;color:#92400e;font-size:0.95rem;">
                        <i class="fas fa-clock" style="margin-right:6px;"></i><b>Comprobante en revisión.</b> Espera a que la administradora lo verifique.
                    </div>`;
                } else {
                    const qrSection = o.qr_image
                        ? `<div style="text-align:center;">
                            <img src="${o.qr_image}" id="qr-img-${o.order_code}" style="max-width:200px;display:block;margin:12px auto;border-radius:12px;border:2px solid #e5e7eb;">
                            <a href="${o.qr_image}" download="QR_Pago_${o.order_code}.png" class="qr-download-btn">
                                <i class="fas fa-download"></i> Descargar QR
                            </a>
                          </div>`
                        : '';
                    const qrInfo = o.qr_info
                        ? `<p style="font-size:0.85rem;text-align:center;white-space:pre-wrap;background:white;border-radius:8px;padding:12px;border:1px solid #e5e7eb;color:#333;">${o.qr_info}</p>`
                        : (!o.qr_image ? `<p style="text-align:center;font-size:0.9rem;color:#555;"><i class="fas fa-qrcode" style="margin-right:4px;"></i>Escríbenos por WhatsApp para recibir el QR de pago.</p>` : '');

                    paymentHtml = `
                    <div style="margin-top:15px;padding:16px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;">
                        <h4 style="margin:0 0 12px 0;color:var(--primario);font-size:1rem;font-family:'Plus Jakarta Sans',sans-serif;">
                            <i class="fas fa-credit-card" style="margin-right:6px;"></i>Realizar Pago por QR
                        </h4>
                        ${qrSection}
                        ${qrInfo}
                        <div style="margin:12px 0;font-size:0.9rem;display:flex;flex-direction:column;gap:8px;">
                            ${o.total_bs !== 'Por cotizar' ? `
                            <div style="background:#ecfdf5;color:#065f46;padding:12px;border-radius:10px;border:1px solid #a7f3d0;">
                                <i class="fas fa-star" style="margin-right:4px;"></i><b>Recomendado:</b> Pago completo <b>Bs ${o.total_bs}</b>
                            </div>
                            <div style="background:#fffbeb;color:#92400e;padding:12px;border-radius:10px;border:1px solid #fde68a;">
                                <i class="fas fa-hourglass-half" style="margin-right:4px;"></i>Reserva pagando el 30%: mínimo <b>Bs ${o.min_payment_bs}</b>
                            </div>` : ''}
                        </div>
                        <form action="../api/payment_submit.php" method="POST" enctype="multipart/form-data"
                            style="display:flex;flex-direction:column;gap:10px;">
                            <input type="hidden" name="order_code" value="${o.order_code}">
                            <div style="display:flex;align-items:center;border:1px solid #d1d5db;border-radius:10px;overflow:hidden;background:white;">
                                <span style="padding:12px 14px;background:#f3f4f6;border-right:1px solid #d1d5db;font-weight:bold;color:var(--primario);font-size:1rem;">Bs</span>
                                <input type="number" name="amount_bs" step="0.01"
                                    min="${o.min_payment_bs || 0}"
                                    value="${o.total_bs !== 'Por cotizar' ? o.total_bs : ''}"
                                    placeholder="Monto pagado"
                                    style="padding:12px;border:none;width:100%;outline:none;font-size:1rem;font-family:'Plus Jakarta Sans',sans-serif;" required>
                            </div>
                            <label style="font-size:0.9rem;font-weight:700;color:#333;">
                                <i class="fas fa-camera" style="margin-right:4px;color:var(--primario);"></i>Sube tu comprobante de pago:
                            </label>
                            <input type="file" name="proof" accept="image/png,image/jpeg,image/webp"
                                style="padding:10px;background:white;border-radius:10px;border:1px solid #d1d5db;width:100%;font-size:0.9rem;" required>
                            <button type="submit" class="btn whatsapp" style="width:100%;padding:14px;border-radius:12px;font-size:1rem;font-weight:700;">
                                <i class="fas fa-upload" style="margin-right:8px;"></i>Enviar Comprobante
                            </button>
                        </form>
                    </div>`;
                }
            }

            // Status badge color
            const statusColors = {
                'created': 'background:#e0f2fe;color:#0369a1;',
                'aprobado_para_pago': 'background:#fef3c7;color:#92400e;',
                'en_produccion': 'background:#fce7f3;color:#be185d;',
                'listo': 'background:#d1fae5;color:#065f46;',
                'entregado': 'background:#f3f4f6;color:#374151;'
            };
            const badgeStyle = statusColors[o.status.toLowerCase()] || 'background:#f3f4f6;color:#333;';

            return `
            <div class="pedido-card">
                <div class="pedido-body">
                    <div class="pedido-header">
                        <div>
                            <span style="font-size:0.8rem; padding:5px 12px; font-weight:700; letter-spacing:0.3px; display:inline-block; border-radius:20px; ${badgeStyle}">${o.status.replace(/_/g, ' ')}</span>
                        </div>
                        <div class="pedido-precio">
                            Bs ${o.total_bs}
                        </div>
                    </div>
                    
                    <h3 style="margin:0; font-size:1.2rem; color:#111; font-family:'Playfair Display',serif; font-weight:700;">
                        Pedido #${o.order_code}
                    </h3>

                    <div class="pedido-info">
                        <div><i class="fas fa-calendar-day" style="color:var(--primario); margin-right:8px; width:16px; text-align:center;"></i>${o.fecha_fmt}</div>
                        <div><i class="fas fa-clock" style="color:var(--primario); margin-right:8px; width:16px; text-align:center;"></i>Retiro: <strong>${o.pickup_date || 'Pendiente'}</strong>${o.pickup_time ? ` · ${o.pickup_time}` : ''}</div>
                    </div>
                    
                    ${timelineHtml}
                    
                    ${paymentHtml}
                </div>
            </div>`;
        }

        cargarPedidos();

        // ── Session check & inject user in nav
        async function verificarSesion() {
            try {
                const res = await fetch('../api/get_session.php');
                const user = await res.json();

                if (!user.logged) {
                    window.location.href = './login.html';
                    return;
                }

                const navLinks = document.getElementById('mainNav');
                navLinks.innerHTML += `
                <a href="./perfil.html" class="item-nav" style="display:flex;align-items:center;gap:8px;background:rgba(255,250,202,0.15);border-radius:20px;padding:5px 15px;">
                    <img src="${user.avatar || ''}" onerror="this.style.display='none'"
                        style="width:28px;height:28px;border-radius:50%;border:2px solid var(--fondo);object-fit:cover;">
                    <span>${(user.name || 'Mi perfil').split(' ')[0]}</span>
                </a>`;

                const ui = await import('./js/ui.js');
                ui.initializeNav();
                ui.bindCartBadge();
            } catch(e) {}
        }
        verificarSesion();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.error('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
